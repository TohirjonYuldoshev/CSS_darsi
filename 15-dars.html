<!DOCTYPE html>
<html lang="en">
<head>
    <title>Document</title>
    <style>
        b {
            background-color: aqua;
            padding: 5px;
            border-radius: 5px;
            transition: 0.5s;
            display: inline-block;
            margin-top: 5px;
        }
        b:hover {
            background-image: linear-gradient(to top right, yellow, rgb(0, 255, 0));
            color: white;
            box-shadow: 3px 3px 5px black;
            transform: scale(1, 2);
            transform: rotate(100dg);
        }
        .ruyxat li:nth-child(2n+1) {
            background-color: rgb(193, 193, 193);
        }
    </style>
</head>
<body>
    <b>Dasturlash</b>
    <b>Dasturlash</b>
    <b>Dasturlash</b>
    <b>Dasturlash</b>
    <button>OK</button>
    <ol class="ruyxat">
        <li>A</li>
        <li>B</li>
        <li>C</li>
        <li>D</li>
        <li>E</li>
    </ol>
</body>
</html>
